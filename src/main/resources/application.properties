# =============================================================================
# application.properties — Configuração do Spring Boot
# =============================================================================
#
# As credenciais batem com o que está no docker-compose.yml (banco rodando
# em container). Para usar outro banco, ajuste a URL/usuário/senha abaixo.
#
# Este arquivo é versionado no repositório porque a "senha" já está pública
# no docker-compose.yml — não há segredo a proteger neste contexto de desafio.
# =============================================================================

# ─── Conexão com o MySQL (do docker-compose.yml) ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/crud_project_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=UnikaDevDB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Hibernate / JPA ──────────────────────────────────────────────────────────
# ddl-auto=update: o Hibernate cria/ajusta as tabelas automaticamente na
# inicialização. Em produção real seria 'validate' + migrations (Flyway/Liquibase),
# mas para um desafio de estágio 'update' é suficiente e prático.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Servidor HTTP ────────────────────────────────────────────────────────────
server.port=8080
