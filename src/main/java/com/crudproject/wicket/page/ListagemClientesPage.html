<!doctype html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org/dtds.data/wicket-xhtml1.4-strict.dtd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes — Listagem</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background-color: #f6f7f9; }
    .app-header { background:#fff; border-bottom:1px solid #e6e8ec; }
    .page-card { background:#fff; border:1px solid #e6e8ec; border-radius:.5rem; }
    .table thead th { font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:#5b6573; background:#f9fafb; border-bottom:1px solid #e6e8ec; }
    .table td { vertical-align: middle; }
    .btn-icon { width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .badge-tipo { font-weight:500; }
    .footer-actions { background:#fff; border-top:1px solid #e6e8ec; }
    .search-wrap { max-width: 560px; }
    .empty-hint { color:#8a93a2; font-size:.85rem; }
    .table-responsive { border-radius:.5rem; }

    /* ===== Paginacao: estiliza o HTML gerado pelo PagingNavigator do Wicket ===== */
    #wicketPaginacao { display: flex; align-items: center; }
    #wicketPaginacao span { display: contents; }
    #wicketPaginacao a {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 .5rem;
      margin: 0 1px;
      border: 1px solid #dee2e6; border-radius: .25rem;
      font-size: .875rem; text-decoration: none;
      color: #0d6efd; background: #fff;
      transition: background .15s, color .15s;
    }
    #wicketPaginacao a:hover { background: #e9ecef; color: #0a58ca; }
    #wicketPaginacao em {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 .5rem;
      margin: 0 1px;
      border: 1px solid #0d6efd; border-radius: .25rem;
      font-size: .875rem; font-style: normal; font-weight: 600;
      color: #fff; background: #0d6efd;
    }
    #wicketPaginacao a[disabled],
    #wicketPaginacao a.wicket_disabled {
      pointer-events: none; opacity: .45;
    }
  </style>
</head>
<body>

  <!-- ============================ HEADER ============================ -->
  <header class="app-header py-3">
    <div class="container-xl d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-people-fill fs-4 text-primary"></i>
        <h1 class="h5 mb-0">Gestão de Clientes</h1>
      </div>
      <nav class="d-none d-md-flex gap-3 small">
        <a href="listagem-clientes.html" class="text-decoration-none fw-semibold">Clientes</a>
        <a href="#" class="text-decoration-none text-muted">Relatórios</a>
        <a href="#" class="text-decoration-none text-muted">Configurações</a>
      </nav>
    </div>
  </header>

  <!-- ============================ PAGE ============================== -->
  <main class="container-xl py-4">

    <!-- Titulo + contadores do header (sempre exibem o total geral) -->
    <div class="d-flex flex-wrap align-items-end justify-content-between mb-3">
      <div>
        <nav aria-label="breadcrumb" class="mb-1">
          <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a href="#" class="text-decoration-none">Início</a></li>
            <li class="breadcrumb-item active" aria-current="page">Clientes</li>
          </ol>
        </nav>
        <h2 class="h4 mb-0">Listagem de Clientes</h2>
      </div>
      <div class="d-flex gap-4 text-center">
        <div>
          <div class="fw-bold fs-4 text-primary" wicket:id="totalClientes">0</div>
          <small class="text-muted">clientes</small>
        </div>
        <div>
          <div class="fw-bold fs-4 text-success" wicket:id="totalAtivos">0</div>
          <small class="text-muted">ativos</small>
        </div>
      </div>
    </div>

    <!-- BuscaPanel: barra de pesquisa + botão de filtros -->
    <div wicket:id="buscaPanel"></div>

    <!-- TabelaClientesPanel: tabela filtrada + paginacao -->
    <div wicket:id="tabelaPanel"></div>

    <!-- Rodapé com acoes globais -->
    <div class="footer-actions page-card mt-3 p-3 d-flex flex-wrap gap-2 justify-content-between">
      <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCriarCliente">
        <i class="bi bi-person-plus me-1"></i> Adicionar Cliente
      </button>
      <div class="d-flex flex-wrap gap-2">
        <button type="button" class="btn btn-outline-primary">
          <i class="bi bi-file-earmark-pdf me-1"></i> Relatório de Todos (PDF)
        </button>
        <button type="button" class="btn btn-outline-success">
          <i class="bi bi-file-earmark-excel me-1"></i> Exportar Excel
        </button>
        <button type="button" class="btn btn-outline-secondary">
          <i class="bi bi-upload me-1"></i> Importar Excel
        </button>
      </div>
    </div>

  </main>

  <!-- FiltrosPanel: modal de filtros (renderizado diretamente no DOM pelo setRenderBodyOnly) -->
  <span wicket:id="filtrosPanel"></span>

  <!-- ====================================================================== -->
  <!-- MODAL: CRIAR CLIENTE (PF ou PJ) — ainda estatico, sera conectado ao    -->
  <!-- Wicket em etapa futura                                                  -->
  <!-- ====================================================================== -->
  <div class="modal fade" id="modalCriarCliente" tabindex="-1" aria-labelledby="modalCriarClienteLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalCriarClienteLabel">
            <i class="bi bi-person-plus me-2"></i>Novo Cliente
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <form id="formCriarCliente" class="row g-3" onsubmit="return false;">

            <!-- Radio PF / PJ -->
            <div class="col-12">
              <label class="form-label fw-semibold">Tipo de Cliente</label>
              <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="tipoCliente" id="tipoPF" value="PF" checked>
                  <label class="form-check-label" for="tipoPF">Pessoa Física (PF)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="tipoCliente" id="tipoPJ" value="PJ">
                  <label class="form-check-label" for="tipoPJ">Pessoa Jurídica (PJ)</label>
                </div>
              </div>
            </div>

            <hr class="mt-2 mb-0">

            <!-- Bloco PF -->
            <div class="col-12" id="blocoCriarPF">
              <h6 class="text-muted small text-uppercase mb-3">Dados — Pessoa Física</h6>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="pfEmail" class="form-label">E-mail</label>
                  <input type="email" class="form-control" id="pfEmail" placeholder="cliente@email.com">
                </div>
                <div class="col-md-6">
                  <label for="pfNome" class="form-label">Nome completo</label>
                  <input type="text" class="form-control" id="pfNome" placeholder="Nome completo">
                </div>
                <div class="col-md-4">
                  <label for="pfCpf" class="form-label">CPF</label>
                  <input type="text" class="form-control" id="pfCpf" placeholder="000.000.000-00">
                </div>
                <div class="col-md-4">
                  <label for="pfRg" class="form-label">RG</label>
                  <input type="text" class="form-control" id="pfRg" placeholder="00.000.000-0">
                </div>
                <div class="col-md-4">
                  <label for="pfNasc" class="form-label">Data de Nascimento</label>
                  <input type="date" class="form-control" id="pfNasc">
                </div>
              </div>
            </div>

            <!-- Bloco PJ -->
            <div class="col-12 d-none" id="blocoCriarPJ">
              <h6 class="text-muted small text-uppercase mb-3">Dados — Pessoa Jurídica</h6>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="pjEmail" class="form-label">E-mail</label>
                  <input type="email" class="form-control" id="pjEmail" placeholder="contato@empresa.com.br">
                </div>
                <div class="col-md-6">
                  <label for="pjCnpj" class="form-label">CNPJ</label>
                  <input type="text" class="form-control" id="pjCnpj" placeholder="00.000.000/0000-00">
                </div>
                <div class="col-md-8">
                  <label for="pjRazao" class="form-label">Razão Social</label>
                  <input type="text" class="form-control" id="pjRazao" placeholder="Razão Social">
                </div>
                <div class="col-md-4">
                  <label for="pjIe" class="form-label">Inscrição Estadual (IE)</label>
                  <input type="text" class="form-control" id="pjIe" placeholder="000.000.000.000">
                </div>
                <div class="col-md-4">
                  <label for="pjCriacao" class="form-label">Data de Criação</label>
                  <input type="date" class="form-control" id="pjCriacao">
                </div>
              </div>
            </div>

          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" form="formCriarCliente" class="btn btn-primary">
            <i class="bi bi-check2 me-1"></i>Salvar Cliente
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle visual PF/PJ para o modal de criar cliente
    document.addEventListener('change', function (e) {
      if (e.target.name === 'tipoCliente') {
        const isPF = e.target.value === 'PF';
        document.getElementById('blocoCriarPF').classList.toggle('d-none', !isPF);
        document.getElementById('blocoCriarPJ').classList.toggle('d-none',  isPF);
      }
    });
  </script>
</body>
</html>
