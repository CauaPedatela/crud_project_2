<!doctype html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org/dtds.data/wicket-xhtml1.4-strict.dtd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes — Listagem</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background-color: #f6f7f9; }
    .app-header { background:#fff; border-bottom:1px solid #e6e8ec; }
    .page-card { background:#fff; border:1px solid #e6e8ec; border-radius:.5rem; }
    .table thead th { font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:#5b6573; background:#f9fafb; border-bottom:1px solid #e6e8ec; }
    .table td { vertical-align: middle; }
    .btn-icon { width:34px; height:34px; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .badge-tipo { font-weight:500; }
    .footer-actions { background:#fff; border-top:1px solid #e6e8ec; }
    .search-wrap { max-width: 560px; }
    .empty-hint { color:#8a93a2; font-size:.85rem; }
    .table-responsive { border-radius:.5rem; }

    /* ===== Paginacao: estiliza o HTML gerado pelo PagingNavigator do Wicket ===== */
    #wicketPaginacao { display: flex; align-items: center; }
    #wicketPaginacao span { display: contents; }
    #wicketPaginacao a {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 .5rem;
      margin: 0 1px;
      border: 1px solid #dee2e6; border-radius: .25rem;
      font-size: .875rem; text-decoration: none;
      color: #0d6efd; background: #fff;
      transition: background .15s, color .15s;
    }
    #wicketPaginacao a:hover { background: #e9ecef; color: #0a58ca; }
    #wicketPaginacao em {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 .5rem;
      margin: 0 1px;
      border: 1px solid #0d6efd; border-radius: .25rem;
      font-size: .875rem; font-style: normal; font-weight: 600;
      color: #fff; background: #0d6efd;
    }
    #wicketPaginacao a[disabled],
    #wicketPaginacao a.wicket_disabled {
      pointer-events: none; opacity: .45;
    }
  </style>
</head>
<body>

  <!-- ============================ HEADER ============================ -->
  <header class="app-header py-3">
    <div class="container-xl d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-people-fill fs-4 text-primary"></i>
        <h1 class="h5 mb-0">Gestão de Clientes</h1>
      </div>
      <nav class="d-none d-md-flex gap-3 small">
        <a href="listagem-clientes.html" class="text-decoration-none fw-semibold">Clientes</a>
        <a href="#" class="text-decoration-none text-muted">Relatórios</a>
        <a href="#" class="text-decoration-none text-muted">Configurações</a>
      </nav>
    </div>
  </header>

  <!-- ============================ PAGE ============================== -->
  <main class="container-xl py-4">

    <!-- Titulo + contadores do header (sempre exibem o total geral) -->
    <div class="d-flex flex-wrap align-items-end justify-content-between mb-3">
      <div>
        <nav aria-label="breadcrumb" class="mb-1">
          <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a href="#" class="text-decoration-none">Início</a></li>
            <li class="breadcrumb-item active" aria-current="page">Clientes</li>
          </ol>
        </nav>
        <h2 class="h4 mb-0">Listagem de Clientes</h2>
      </div>
      <div class="d-flex gap-4 text-center">
        <div>
          <div class="fw-bold fs-4 text-primary" wicket:id="totalClientes">0</div>
          <small class="text-muted">clientes</small>
        </div>
        <div>
          <div class="fw-bold fs-4 text-success" wicket:id="totalAtivos">0</div>
          <small class="text-muted">ativos</small>
        </div>
      </div>
    </div>

    <!-- BuscaPanel: barra de pesquisa + botão de filtros -->
    <div wicket:id="buscaPanel"></div>

    <!-- TabelaClientesPanel: tabela filtrada + paginacao -->
    <div wicket:id="tabelaPanel"></div>

    <!-- Rodapé com botões de relatório global -->
    <div class="footer-actions page-card mt-3 p-3 d-flex flex-wrap gap-2 justify-content-end">
      <a href="/api/relatorios/clientes/pdf" target="_blank" class="btn btn-outline-primary">
        <i class="bi bi-file-earmark-pdf me-1"></i> Relatório de Todos (PDF)
      </a>
      <a href="/api/relatorios/clientes/excel" target="_blank" class="btn btn-outline-success">
        <i class="bi bi-file-earmark-excel me-1"></i> Exportar Excel
      </a>
    </div>

  </main>

  <!-- FiltrosPanel: modal de filtros (renderizado diretamente no DOM pelo setRenderBodyOnly) -->
  <span wicket:id="filtrosPanel"></span>

  <!-- ====================================================================== -->
  <!-- MODAL: EMITIR RELATÓRIO POR CLIENTE (por linha da tabela)              -->
  <!-- Os links recebem o href correto via JS antes da abertura do modal.     -->
  <!-- ====================================================================== -->
  <div class="modal fade" id="modalRelatorioLista" tabindex="-1"
       aria-labelledby="modalRelatorioListaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalRelatorioListaLabel">
            <i class="bi bi-file-earmark-text me-2"></i>Emitir Relatório
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">Selecione o formato para o cliente selecionado:</p>
          <div class="d-grid gap-2">
            <a id="linkRelatorioPdfLista" href="#" class="btn btn-outline-danger" target="_blank">
              <i class="bi bi-file-earmark-pdf me-2"></i>Gerar PDF
            </a>
            <a id="linkRelatorioExcelLista" href="#" class="btn btn-outline-success" target="_blank">
              <i class="bi bi-file-earmark-excel me-2"></i>Exportar Excel
            </a>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-link text-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Abre o modal de relatório e ajusta os links de PDF e Excel para o cliente correto.
    // Chamado pelo onclick do botão "Relatório" em cada linha da tabela.
    function abrirModalRelatorio(id) {
      document.getElementById('linkRelatorioPdfLista').href =
        '/api/relatorios/cliente/detalhes/pdf?id=' + id;
      document.getElementById('linkRelatorioExcelLista').href =
        '/api/relatorios/cliente/detalhes/excel?id=' + id;
      new bootstrap.Modal(document.getElementById('modalRelatorioLista')).show();
    }
  </script>
</body>
</html>
