<!doctype html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org/dtds.data/wicket-xhtml1.4-strict.dtd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clientes — Listagem</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- clientes.css é injetado via PackageResourceReference no renderHead() -->
</head>
<body>

<header class="app-header py-3">
  <div class="container-xl d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-people-fill fs-4 text-primary"></i>
      <h1 class="h5 mb-0">Gestão de Clientes</h1>
    </div>
  </div>
</header>

<main class="container-xl py-4">

  <div wicket:id="feedback"></div>

  <div class="d-flex flex-wrap align-items-end justify-content-between mb-3">
    <div>
      <nav aria-label="breadcrumb" class="mb-1">
        <ol class="breadcrumb small mb-0">
          <li class="breadcrumb-item"><a href="#" class="text-decoration-none">Início</a></li>
          <li class="breadcrumb-item active" aria-current="page">Clientes</li>
        </ol>
      </nav>
      <h2 class="h4 mb-0">Listagem de Clientes</h2>
    </div>
    <div wicket:id="contadoresHeader"></div>
  </div>

  <div wicket:id="buscaPanel"></div>
  <div wicket:id="tabelaPanel"></div>
  <div wicket:id="rodapeAcoes"></div>

</main>

<span wicket:id="filtrosPanel"></span>

<div wicket:id="modalRelatorio"></div>
<div wicket:id="modalExcluirCliente"></div>
<div wicket:id="modalEditarCliente"></div>
<div wicket:id="modalCriarCliente"></div>
<div wicket:id="modalImportarExcel"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<!-- clientes.js é injetado via PackageResourceReference no renderHead() -->

</body>
</html>
