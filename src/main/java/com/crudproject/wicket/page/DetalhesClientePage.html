<!doctype html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org/dtds.data/wicket-xhtml1.4-strict.dtd">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cliente — Detalhes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- clientes.css é injetado via PackageResourceReference no renderHead() -->
</head>
<body>

  <header class="app-header py-3">
    <div class="container-xl d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-people-fill fs-4 text-primary"></i>
        <h1 class="h5 mb-0">Gestão de Clientes</h1>
      </div>
      <nav class="d-none d-md-flex gap-3 small">
        <a wicket:id="linkNavClientes" class="text-decoration-none fw-semibold">Clientes</a>
      </nav>
    </div>
  </header>

  <main class="container-xl py-4">

    <div wicket:id="feedback"></div>

    <div class="d-flex flex-wrap align-items-end justify-content-between mb-3 gap-2">
      <div>
        <nav aria-label="breadcrumb" class="mb-1">
          <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a wicket:id="linkBreadcrumb" class="text-decoration-none">Clientes</a></li>
            <li class="breadcrumb-item active" aria-current="page">Detalhes</li>
          </ol>
        </nav>
        <h2 class="h4 mb-0">Detalhes do Cliente</h2>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a wicket:id="linkVoltar" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
        <button type="button" wicket:id="btnRelatorio" class="btn btn-primary fw-semibold">
          <i class="bi bi-file-earmark-text me-1"></i>Relatório
        </button>
        <button type="button" wicket:id="btnEditarCliente" class="btn btn-primary fw-semibold">
          <i class="bi bi-pencil-fill me-1"></i>Editar
        </button>
      </div>
    </div>

    <div wicket:id="cardCliente"></div>
    <div wicket:id="enderecosLista"></div>

  </main>

  <div wicket:id="modalRelatorio"></div>
  <div wicket:id="modalEditarCliente"></div>
  <div wicket:id="modalExcluirEndereco"></div>
  <div wicket:id="modalEditarEndereco"></div>
  <div wicket:id="modalAdicionarEndereco"></div>

  <!-- Modal de aviso "endereço não pode ser excluído" — puro Bootstrap (sem Wicket),
       acionado por mostrarAvisoNaoPodeDeletar(btn) em clientes.js. -->
  <div class="modal fade" id="modalAvisoEnderecoNaoPodeDeletar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body text-center px-4 pb-2">
          <div class="mb-3">
            <i class="bi bi-info-circle-fill text-warning" style="font-size:2.5rem;"></i>
          </div>
          <p class="mb-0" id="txtAvisoEnderecoNaoPodeDeletar"></p>
        </div>
        <div class="modal-footer border-0 justify-content-center pb-4">
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
  <!-- clientes.js é injetado via PackageResourceReference no renderHead() -->

</body>
</html>
