<html xmlns:wicket="http://wicket.apache.org/dtds.data/wicket-xhtml1.4-strict.dtd">
<body>
<wicket:panel>
  <form wicket:id="formExcluirCliente">
    <input type="hidden" wicket:id="hiddenClienteId"/>
    <div class="modal fade" id="modalConfirmarExclusao" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body text-center px-5 pb-2">
            <div class="mb-3">
              <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
            </div>
            <h5 class="fw-bold mb-1">Excluir Cliente?</h5>
            <p class="text-muted mb-0">
              Esta ação é irreversível. Todos os endereços vinculados também serão removidos.
            </p>
          </div>
          <div class="modal-footer border-0 justify-content-center pb-4 gap-2">
            <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" wicket:id="btnConfirmarExclusao" class="btn btn-danger fw-semibold px-4">
              <i class="bi bi-trash-fill me-1"></i>Confirmar Exclusão
            </button>
          </div>
        </div>
      </div>
    </div>
  </form>
</wicket:panel>
</body>
</html>
