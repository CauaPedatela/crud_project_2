<!-- ================================================================
     app.component.html — Template raiz do aplicativo

     Estrutura:
       - mat-toolbar: barra de navegação fixa no topo
       - router-outlet: espaço onde as páginas são renderizadas
         (ListagemComponent ou DetalhesComponent, conforme a URL)
     ================================================================ -->

<!-- Barra de navegação principal
     Fundo branco com borda inferior — espelha o .app-header do Wicket.
     O .header-container centraliza e limita a largura igual ao container-xl. -->
<mat-toolbar class="app-header">
  <div class="header-container">
    <!-- Ícone vermelho + título (Wicket: bi-people-fill text-primary) -->
    <mat-icon class="header-icon">people</mat-icon>
    <a mat-button routerLink="/clientes" class="toolbar-titulo">
      {{ titulo }}
    </a>
  </div>
</mat-toolbar>

<!-- Área de conteúdo: o Angular Router renderiza aqui
     a página correspondente à URL atual -->
<router-outlet></router-outlet>
