<!-- Modal de confirmação de exclusão -->
<mat-dialog-content style="text-align: center; padding: 32px 24px 16px;">
  <mat-icon style="font-size: 56px; width: 56px; height: 56px; color: #f44336;">
    warning_amber
  </mat-icon>
  <h2 mat-dialog-title style="margin: 16px 0 8px;">Excluir Cliente?</h2>
  <p class="mat-body-1" style="color: #555; margin: 0;">
    Você está prestes a excluir <strong>{{ cliente.nome }}</strong>.<br>
    Esta ação é irreversível — todos os endereços vinculados também serão removidos.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="center" style="padding-bottom: 24px; gap: 12px;">
  <button mat-stroked-button (click)="cancelar()" [disabled]="excluindo">
    Cancelar
  </button>
  <button mat-raised-button color="warn" (click)="confirmar()" [disabled]="excluindo">
    <mat-icon *ngIf="!excluindo">delete</mat-icon>
    <mat-spinner *ngIf="excluindo" diameter="18" style="display:inline-block;"></mat-spinner>
    {{ excluindo ? 'Excluindo…' : 'Confirmar Exclusão' }}
  </button>
</mat-dialog-actions>
