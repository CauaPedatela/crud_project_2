# =============================================================================
# ⚠️ ARQUIVO OBSOLETO — NÃO É MAIS UTILIZADO
# =============================================================================
# Este nginx.conf foi criado para o Dockerfile do frontend Angular, que está
# obsoleto (ver comentário no Dockerfile ao lado). A decisão atual é dockerizar
# APENAS o banco — o Angular roda localmente via "npm run start" (que já tem
# seu próprio dev server com hot reload).
#
# Mantido aqui apenas como referência: se um dia o frontend voltar pro Docker,
# este arquivo continua válido como configuração do Nginx para SPAs.
# =============================================================================
#
# nginx.conf — Configuração do servidor web para o frontend Angular
# =============================================================================
#
# Por que esse arquivo existe?
# O Angular é uma SPA (Single Page Application): há apenas um index.html e
# o Angular controla as rotas via JavaScript no browser. Quando o usuário
# aperta F5 ou acessa uma URL diretamente (ex: /clientes/5), o nginx recebe
# a requisição e tenta encontrar um arquivo físico com esse caminho — que não
# existe. Sem essa configuração, o resultado seria um erro 404.
#
# A diretiva "try_files" resolve isso: tenta servir o arquivo real (CSS, JS,
# imagem), e se não encontrar, cai de volta para o index.html — deixando o
# Angular assumir o controle da rota no browser.
# =============================================================================

server {
    # Porta que o nginx escuta dentro do container (mapeada para 4200 no host)
    listen 80;

    # Pasta onde estão os arquivos compilados do Angular
    root /usr/share/nginx/html;

    # Arquivo padrão a servir quando a URL aponta para uma pasta
    index index.html;

    location / {
        # Tenta servir na ordem:
        #   1. O arquivo exato que foi pedido (ex: main.js, styles.css)
        #   2. Uma pasta com esse nome
        #   3. Se não achar nenhum dos dois, devolve o index.html
        #      e deixa o Angular cuidar da rota no browser
        try_files $uri $uri/ /index.html;
    }

    # Otimização: arquivos com hash no nome (gerados pelo Angular) podem ser
    # cacheados por muito tempo — o nome muda a cada build nova, então não
    # há risco de o browser usar uma versão desatualizada
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
